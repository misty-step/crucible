name: Landmark Release Notes

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release-tag:
        description: Existing release tag to synthesize.
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: landmark-${{ github.event.release.tag_name || inputs.release-tag }}
  cancel-in-progress: false

jobs:
  synthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Landmark
        uses: misty-step/landmark@v0
        with:
          mode: synthesis-only
          healthcheck: 'true'
          release-tag: ${{ github.event.release.tag_name || inputs.release-tag }}
          github-token: ${{ github.token }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          changelog-source: auto
