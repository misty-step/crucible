version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - misspell
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
  misspell:
    locale: US
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
      - name: var-decl
      - name: range
      - name: receiver-naming
      - name: error-naming
      - name: error-strings
      - name: errorf

issues:
  exclude-rules:
    - path: testdata
      linters:
        - revive
        - gocritic
